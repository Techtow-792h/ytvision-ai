<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>YTVision AI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080808;color:#fff;font-family:Georgia,serif;min-height:100vh}
input{width:100%;background:#181818;border:1px solid #333;border-radius:10px;padding:12px 14px;color:#fff;font-size:14px;outline:none;margin-bottom:12px}
button{width:100%;background:linear-gradient(135deg,#ff4545,#c0392b);color:#fff;border:none;border-radius:10px;padding:14px;font-weight:700;font-size:15px;cursor:pointer}
button:disabled{background:#333;cursor:not-allowed}
.card{background:#0f0f0f;border:1px solid #2a2a2a;border-radius:16px;padding:20px;margin-bottom:16px}
.label{color:#ff4545;font-size:11px;font-family:monospace;letter-spacing:1px;margin-bottom:8px}
.tag{background:#1a1a1a;border:1px solid #333;color:#aaa;padding:4px 12px;border-radius:100px;font-size:12px;display:inline-block;margin:3px}
.thumb{border-radius:16px;overflow:hidden;background:#0f0f0f;border:1px solid #2a2a2a;margin-bottom:16px}
.thumb-img{aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:20px;position:relative}
.error{background:rgba(255,0,0,0.05);border:1px solid rgba(255,0,0,0.2);border-radius:8px;color:#ff6060;padding:12px;margin-top:12px;font-size:13px}
.green{background:rgba(78,204,163,0.05);border:1px solid rgba(78,204,163,0.3);border-radius:16px;padding:20px;margin-bottom:16px}
.status{background:rgba(255,69,69,0.05);border:1px solid rgba(255,69,69,0.15);border-radius:8px;color:#ff7070;padding:12px;margin-top:12px;font-size:13px;font-family:monospace}
</style>
</head>
<body>
<div style="background:#0f0f0f;border-bottom:1px solid #1a1a1a;padding:28px 20px;text-align:center">
  <h1 style="font-size:36px;font-weight:900;letter-spacing:-2px;margin-bottom:6px">
    <span style="color:#ff4545">YT</span>Vision<span style="color:#444">.ai</span>
  </h1>
  <p style="color:#666;font-size:14px">Paste a YouTube link → AI detects topic, person & generates thumbnails</p>
</div>

<div style="max-width:700px;margin:0 auto;padding:24px 16px">
  <div class="card">
    <div class="label">PASTE YOUTUBE LINK</div>
    <input id="urlInput" placeholder="https://youtube.com/watch?v=..."/>
    <button id="analyzeBtn" onclick="analyze()">⚡ ANALYZE VIDEO</button>
    <div id="statusBox" style="display:none" class="status"></div>
    <div id="errorBox" class="error" style="display:none"></div>
  </div>

  <div id="metaBox" style="display:none" class="card">
    <div style="display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap">
      <img id="metaThumb" style="width:110px;border-radius:8px;flex-shrink:0"/>
      <div style="flex:1;min-width:180px">
        <div class="label">VIDEO FOUND ✓</div>
        <div id="metaTitle" style="font-weight:700;font-size:16px;line-height:1.3;margin-bottom:4px"></div>
        <div id="metaAuthor" style="color:#888;font-size:13px"></div>
        <div id="metaBadges" style="margin-top:8px"></div>
      </div>
    </div>
  </div>

  <div id="results" style="display:none">
    <div class="card">
      <div class="label">🎯 MAIN TOPIC</div>
      <div id="rTopic" style="font-size:17px;font-weight:700;margin-bottom:10px"></div>
      <div id="rSummary" style="color:#bbb;font-size:14px;line-height:1.7"></div>
    </div>
    <div id="personBox" class="green">
      <div style="color:#4ecca3;font-size:11px;font-family:monospace;margin-bottom:10px">👤 PERSON DETECTION</div>
      <div id="rPerson"></div>
    </div>
    <div class="card">
      <div class="label">📌 KEY POINTS</div>
      <div id="rPoints"></div>
    </div>
    <div class="card">
      <div class="label">🏷 TAGS</div>
      <div id="rTags"></div>
    </div>
    <div>
      <div style="text-align:center;color:#ff4545;font-size:13px;font-family:monospace;letter-spacing:2px;margin-bottom:16px">🖼 AI THUMBNAIL CONCEPTS</div>
      <div id="rThumbs"></div>
    </div>
  </div>

  <div style="text-align:center;color:#333;font-size:12px;font-family:monospace;padding:24px 0">
    Free · Powered by Google Gemini AI
  </div>
</div>

<script>
const WORKER_URL = 'https://ytvision-ai.anirbank796.workers.dev/';

function extractId(url){
  const p=[/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/,/youtube\.com\/shorts\/([^&\n?#]+)/];
  for(const r of p){const m=url.match(r);if(m)return m[1];}
  return null;
}
function show(id){document.getElementById(id).style.display='block';}
function hide(id){document.getElementById(id).style.display='none';}
function setText(id,txt){document.getElementById(id).textContent=txt;}
function setHTML(id,html){document.getElementById(id).innerHTML=html;}
function setStatus(msg){if(msg){show('statusBox');setText('statusBox',msg);}else{hide('statusBox');}}
function setError(msg){if(msg){show('errorBox');setText('errorBox',msg);}else{hide('errorBox');}}

async function analyze(){
  const url=document.getElementById('urlInput').value.trim();
  const btn=document.getElementById('analyzeBtn');
  setError('');
  hide('results');
  hide('metaBox');

  const id=extractId(url);
  if(!id){setError('❌ Invalid YouTube URL. Please paste a valid link.');return;}

  btn.disabled=true;

  try{
    setStatus('🔍 Fetching video info...');
    const meta=await fetch('https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v='+id+'&format=json').then(r=>{
      if(!r.ok)throw new Error('Video not found');
      return r.json();
    });

    document.getElementById('metaThumb').src='https://img.youtube.com/vi/'+id+'/hqdefault.jpg';
    setText('metaTitle',meta.title);
    setText('metaAuthor','📺 '+meta.author_name);
    show('metaBox');

    setStatus('📝 Fetching transcript...');
    let transcript=null;
    try{
      const tr=await fetch('https://tactiq-apps-prod.tactiq.io/transcript',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({videoUrl:'https://www.youtube.com/watch?v='+id,language:'en'})
      }).then(r=>r.json());
      if(tr?.captions?.length)transcript=tr.captions.map(c=>c.text).join(' ');
    }catch(e){}

    setStatus('🤖 Gemini AI is analyzing...');

    const prompt=`Analyze this YouTube video. Reply with ONLY a raw JSON object. No markdown. No backticks. Just JSON.

Title: ${meta.title}
Channel: ${meta.author_name}
${transcript?'Transcript:\n'+transcript.slice(0,1500):'[No transcript - analyze from title]'}

Return this exact JSON:
{"topic":"one sentence topic","category":"Tech or Education or Entertainment or Gaming or Music or News or Sports","summary":"3 sentences about the video","keyPoints":["point 1","point 2","point 3","point 4"],"detectedPerson":{"found":true,"name":"person name or null","role":"their job or null","confidence":"high or medium or low"},"sentiment":"Positive or Negative or Neutral or Informative","targetAudience":"who watches this","tags":["tag1","tag2","tag3","tag4","tag5"],"thumbnailSuggestions":[{"style":"Bold Text","description":"bright bold thumbnail","textOverlay":"SHORT CATCHY TEXT","colorScheme":"red and black","emoji":"🔥","bgGradient":"linear-gradient(135deg,#1a1a2e,#16213e)"},{"style":"Face + Text","description":"person reacting","textOverlay":"I Can't Believe This","colorScheme":"yellow and dark","emoji":"😱","bgGradient":"linear-gradient(135deg,#c0392b,#8e44ad)"},{"style":"Curiosity Gap","description":"mystery style","textOverlay":"What Happened Next...","colorScheme":"orange and red","emoji":"❓","bgGradient":"linear-gradient(135deg,#f39c12,#e74c3c)"},{"style":"Minimal Clean","description":"clean professional","textOverlay":"The Real Story","colorScheme":"white and green","emoji":"✨","bgGradient":"linear-gradient(135deg,#2ecc71,#1abc9c)"}]}`;

    const aiRes=await fetch(WORKER_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prompt})
    });

    const aiData=await aiRes.json();
    const aiText=aiData?.candidates?.[0]?.content?.parts?.[0]?.text||'';
    if(!aiText)throw new Error('No response from AI. Please try again.');

    const s=aiText.indexOf('{');
    const e=aiText.lastIndexOf('}');
    if(s===-1)throw new Error('Bad AI response. Try again.');
    const data=JSON.parse(aiText.slice(s,e+1));

    setHTML('metaBadges',
      `<span style="background:rgba(255,69,69,0.15);color:#ff7070;padding:2px 10px;border-radius:100px;font-size:12px">${data.category}</span>
       <span style="background:rgba(255,255,255,0.05);color:#aaa;padding:2px 10px;border-radius:100px;font-size:12px;margin-left:6px">${data.sentiment}</span>
       <span style="background:${transcript?'rgba(0,200,100,0.1)':'rgba(255,200,0,0.1)'};color:${transcript?'#4ecca3':'#ffd700'};padding:2px 10px;border-radius:100px;font-size:12px;margin-left:6px">${transcript?'✓ Transcript':'⚠ No transcript'}</span>`
    );

    setText('rTopic',data.topic);
    setText('rSummary',data.summary);

    const p=data.detectedPerson;
    setHTML('rPerson',p?.found
      ?`<div style="font-size:16px;font-weight:700">🙂 ${p.name||'Person detected'}</div>${p.role?`<div style="color:#888;font-size:13px;margin-top:4px">${p.role}</div>`:''}<div style="margin-top:8px;color:#4ecca3;font-size:12px">Confidence: ${p.confidence}</div>`
      :`<div style="color:#666;font-size:14px">🎭 No specific person detected</div>`
    );

    setHTML('rPoints',data.keyPoints.map((pt,i)=>
      `<div style="display:flex;gap:10px;margin-bottom:10px;color:#ccc;font-size:14px;line-height:1.5"><span style="color:#ff4545;font-weight:700;flex-shrink:0">${i+1}.</span>${pt}</div>`
    ).join(''));

    setHTML('rTags',data.tags.map(t=>`<span class="tag">#${t}</span>`).join(''));

    setHTML('rThumbs',data.thumbnailSuggestions.map((th,i)=>`
      <div class="thumb">
        <div class="thumb-img" style="background:${th.bgGradient}">
          <div style="font-size:40px">${th.emoji}</div>
          <div style="font-size:18px;font-weight:900;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,0.8);text-align:center;margin-top:8px;font-family:Georgia,serif;max-width:260px">${th.textOverlay}</div>
          <div style="position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.7);color:#fff;padding:3px 8px;border-radius:6px;font-size:11px">#${i+1}</div>
        </div>
        <div style="padding:14px 16px">
          <div style="color:#ff4545;font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:4px">${th.style}</div>
          <div style="color:#ccc;font-size:13px">${th.description}</div>
          <div style="color:#666;font-size:11px;margin-top:6px;font-style:italic">${th.colorScheme}</div>
        </div>
      </div>`).join(''));

    show('results');
    setStatus('');

  }catch(err){
    setError('⚠️ '+err.message);
    setStatus('');
  }

  btn.disabled=false;
}
</script>
</body>
</html>
